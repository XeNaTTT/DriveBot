workflows:
  ios-testflight:
    name: iOS TestFlight (Flutter)
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: de.driveassistant.ar
        APPLE_TEAM_ID: QLQ959FUNR
      ios_signing:
        distribution_type: app_store
        bundle_identifier: de.driveassistant.ar

    scripts:
      - name: Flutter clean
        script: flutter clean

      - name: Resolve Flutter dependencies
        script: flutter pub get

      - name: Static analysis
        script: flutter analyze

      - name: Unit and widget tests
        script: flutter test

      - name: Prepare iOS project without code signing
        script: |
          flutter build ios \
            --release \
            --no-codesign

      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          flutter build ipa \
            --release \
            --build-name=1.0.$PROJECT_BUILD_NUMBER \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
