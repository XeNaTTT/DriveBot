workflows:
  ios-testflight:
    name: iOS TestFlight (Flutter)
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: de.driveassistant.ar
        APPLE_TEAM_ID: QLQ959FUNR
        APP_STORE_CONNECT_ISSUER_ID: f35866c-ef2b-4073-8eaf-ec47bd88f931
        APP_STORE_CONNECT_KEY_IDENTIFIER: 6287LX5AL8
      ios_signing:
        distribution_type: app_store
        bundle_identifier: de.driveassistant.ar
      groups:
        - app_store_connect
        - ios_signing

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Validate required secret variables
        script: |
          test -n "$APP_STORE_CONNECT_PRIVATE_KEY"
          test -n "$CERTIFICATE_PRIVATE_KEY"
      - name: Set up App Store Connect API key file
        script: |
          cat > /tmp/app_store_connect_key.p8 <<'KEY'
          $APP_STORE_CONNECT_PRIVATE_KEY
          KEY
      - name: Flutter clean
        script: flutter clean
      - name: Resolve Flutter dependencies
        script: flutter pub get
      - name: Static analysis
        script: flutter analyze
      - name: Unit and widget tests
        script: flutter test
      - name: Build iOS IPA (Flutter)
        script: |
          flutter build ipa \
            --release \
            --build-name=1.0.$PROJECT_BUILD_NUMBER \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

